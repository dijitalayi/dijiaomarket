<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d48a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8a147;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e6b23;stop-opacity:1" />
    </linearGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feOffset dx="1" dy="1" />
      <feComposite in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1" result="shadow" />
      <feFlood flood-color="black" flood-opacity="0.5" result="color" />
      <feComposite in2="shadow" operator="in" />
      <feComposite in2="SourceGraphic" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="48" fill="url(#goldGradient)" stroke="#5d4300" stroke-width="1" />
  
  <!-- Inner Detail Ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#8e6b23" stroke-width="2" stroke-dasharray="2,2" />
  
  <!-- Center Plate -->
  <circle cx="50" cy="50" r="32" fill="url(#goldGradient)" filter="url(#innerShadow)" stroke="#5d4300" stroke-width="0.5" />
  
  <!-- Albion 'Hammer' Style Symbol -->
  <path d="M50 30 L55 45 L70 45 L58 55 L63 70 L50 60 L37 70 L42 55 L30 45 L45 45 Z" fill="#5d4300" opacity="0.8" />
</svg>
